<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes pressSwapIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pressSwap { animation: pressSwapIn .32s cubic-bezier(.2,.7,.2,1); }
  @media (prefers-reduced-motion: reduce) { .pressSwap { animation: none; } }
</style>
